    <script>lucide.createIcons();</script>
<script src="/js/owner-auth.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", async () => {
        OwnerAuth.checkAccessAndRenderMenu();
        const ownerId = OwnerAuth.getOwnerId();
        if (!ownerId) {
            console.error("No owner ID found. Redirecting to login...");
            OwnerAuth.logout();
            return;
        }

        try {
            // Placeholder: Thay endpoint thực tế tại đây nếu system đã hỗ trợ tính toán gộp (VD: api/bookings/owner/stats)
            // Hiện tại ta có thể mock fetch danh sách venue để lấy tổng số sân
            const venuesRes = await OwnerAuth.authFetch(`/api/venues/owner/${ownerId}`);
            if (venuesRes.ok) {
                const venuesData = await venuesRes.json();
                const venues = venuesData.data || [];

                let allCourts = [];
                for (const v of venues) {
                    const courtsRes = await OwnerAuth.authFetch(`/api/courts/venue/${v.id}`);
                    if (courtsRes.ok) {
                        const courtsData = await courtsRes.json();
                        allCourts = allCourts.concat(courtsData.data || []);
                    }
                }

                // Tạm mock stat dựa trên tổng số sân (do chưa có API trả thẳng booking/doanh thu cho dashboard chủ sân)
                const totalCourts = allCourts.length;
                document.getElementById("stat-playing-courts").textContent = "0"; // Mock
                document.getElementById("stat-total-courts").textContent = `/${totalCourts}`;
                document.getElementById("stat-available-courts").textContent = totalCourts;

                renderLiveCourts(allCourts);
            }
        } catch (error) {
            console.error("Lỗi khi load dữ liệu dashboard:", error);
        }
    });

    function renderLiveCourts(courts) {
        const container = document.getElementById("live-courts-container");
        container.innerHTML = "";

        if (!courts || courts.length === 0) {
            container.innerHTML = `<p class="col-span-full uppercase text-sm font-bold text-slate-400">Không có sân nào.</p>`;
            return;
        }

        courts.forEach(court => {
            // Tạm thời coi tất cả sân là Trống (vì dữ liệu hiện tại từ bảng court chưa trả kèm Realtime API cho bookings)
            // Nếu có API CourtStatus, thay đổi trạng thái và màu tương ứng
            const div = document.createElement("div");
            div.className = "bg-surface-container-lowest rounded-xl shadow-sm overflow-hidden relative";
            div.innerHTML = `
                <div class="absolute left-0 top-0 w-1 h-full bg-green-500"></div>
                <div class="p-5">
                    <div class="flex justify-between items-start mb-3">
                        <h4 class="font-black text-lg">${court.courtName || 'Sân ' + court.id}</h4>
                        <span class="text-[10px] bg-green-500/10 text-green-600 px-2 py-1 rounded font-bold uppercase tracking-tighter">TRỐNG</span>
                    </div>
                    <div class="mb-10 text-center py-4">
                        <span class="material-symbols-outlined text-green-500/20 text-5xl" data-icon="check_circle">check_circle</span>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <button class="py-2 kinetic-gradient text-white text-xs font-bold rounded-lg hover:opacity-90 transition-opacity">Đặt nhanh</button>
                        <button class="py-2 bg-slate-100 text-slate-700 text-xs font-bold rounded-lg hover:bg-slate-200 transition-colors">Khóa sân</button>
                    </div>
                </div>
            `;
            container.appendChild(div);
        });
    }
</script>
