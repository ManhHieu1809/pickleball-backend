    <script>
        lucide.createIcons();

        document.getElementById('bookingDate').valueAsDate = new Date();

        document.querySelectorAll('.payment-method-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.payment-method-btn').forEach(b => {
                    b.classList.remove('bg-white', 'border-primary-container', 'text-primary', 'shadow-md');
                    b.classList.add('bg-surface-container-low', 'text-on-surface-variant', 'border-transparent');
                });

                const target = e.currentTarget;
                target.classList.remove('bg-surface-container-low', 'text-on-surface-variant', 'border-transparent');
                target.classList.add('bg-white', 'border-primary-container', 'text-primary', 'shadow-md');

                document.getElementById('selectedPaymentMethod').value = target.dataset.method;
            });
        });

        let selectedSlot = null;
        let selectedCourtInfo = null;

        document.addEventListener('DOMContentLoaded', async () => {
            OwnerAuth.checkAccessAndRenderMenu();
            await loadCourts();
        });

        async function loadCourts() {
            const select = document.getElementById('courtId');
            try {
                const user = OwnerAuth.getUser();
                if(!user) {
                    select.innerHTML = '<option value="">-- Lỗi đăng nhập --</option>';
                    return;
                }

                // If user is Staff, get courts for their assigned venue
                // If user is Owner, get courts for all their venues
                let allCourts = [];

                if (user.roles && user.roles.includes('STAFF')) {
                    // Staff only sees their own venue
                    if (user.venueId) {
                        const courtsRes = await OwnerAuth.authFetch(`/api/courts/venue/${user.venueId}`);
                        if(courtsRes.ok) {
                            const courtsJson = await courtsRes.json();
                            (courtsJson.data || []).forEach(c => {
                                allCourts.push({...c, venueName: user.venueName || 'Sân của bạn'});
                            });
                        }
                    } else {
                        throw new Error('Tài khoản nhân viên chưa được gán ID cơ sở');
                    }
                } else {
                    // Owner sees all their venues
                    const ownerId = OwnerAuth.getOwnerId();
                    if(!ownerId) throw new Error('Chưa lấy được ID chủ sân');

                    const res = await OwnerAuth.authFetch(`/api/venues/owner/${ownerId}`);
                    if (!res.ok) throw new Error("Thất bại khi lấy danh sách cơ sở");
                    const json = await res.json();
                    const venues = json.data || [];

                    // Dùng Promise.all để tăng tốc load các sân
                    const courtPromises = venues.map(async (venue) => {
                        const courtsRes = await OwnerAuth.authFetch(`/api/courts/venue/${venue.id}`);
                        if(courtsRes.ok) {
                            const courtsJson = await courtsRes.json();
                            (courtsJson.data || []).forEach(c => {
                                allCourts.push({...c, venueName: venue.name});
                            });
                        }
                    });
                    await Promise.all(courtPromises);
                }

                if (allCourts.length === 0) {
                     select.innerHTML = '<option value="">-- Không có sân nào --</option>';
                     return;
                }

                select.innerHTML = '<option value="">-- Chọn sân --</option>' +
                    allCourts.map(c => `<option value="${c.id}" data-price="${c.basePrice || 200000}" data-name="${c.courtName}">[${c.venueName}] ${c.courtName}</option>`).join('');

            } catch (e) {
                console.error(e);
                select.innerHTML = '<option value="">-- ' + (e.message || 'Lỗi tải sân') + ' --</option>';
            }
        }

        async function loadAvailableSlots() {
            const courtId = document.getElementById('courtId').value;
            const date = document.getElementById('bookingDate').value;

            if(!courtId || !date) return;

            const select = document.getElementById('courtId');
            const option = select.options[select.selectedIndex];
            selectedCourtInfo = {
                id: courtId,
                name: option.dataset.name,
                price: parseInt(option.dataset.price || 200000)
            };

            const container = document.getElementById('slotsContainer');
            container.innerHTML = '<p class="text-sm">Đang tìm giờ trống...</p>';

            try {
                // Gọi API lấy TẤT CẢ slot để có thể hiển thị cả những slot đã đặt (mờ đi)
                const res = await OwnerAuth.authFetch(`/api/courts/${courtId}/slots/all?date=${date}`);
                if (!res.ok) throw new Error("Failed");
                const json = await res.json();

                renderSlots(json.data || [], date);
            } catch(e) {
                container.innerHTML = '<p class="text-sm text-error">Lỗi khi tải slot</p>';
            }
        }

        function renderSlots(slots, selectedDate) {
            const container = document.getElementById('slotsContainer');
            selectedSlot = null;
            updateSummary();

            if(slots.length === 0) {
                container.innerHTML = '<p class="text-sm">Không có slot nào cho ngày này.</p>';
                return;
            }

            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            const isToday = selectedDate === todayStr;

            container.innerHTML = slots.map(s => {
                const price = s.priceAmount || selectedCourtInfo.price;

                // Kiểm tra xem slot này đã trôi qua thời gian chưa
                let isPast = false;
                if (isToday && s.startTime) {
                    const timeParts = s.startTime.split(':');
                    const slotDateTime = new Date();
                    slotDateTime.setHours(parseInt(timeParts[0]), parseInt(timeParts[1] || '0'), 0, 0);
                    if (slotDateTime < now) {
                        isPast = true;
                    }
                }

                // Nếu slot đã được đặt (available === false) hoặc đã trôi qua (isPast === true)
                if (s.available === false || isPast) {
                     return `
                        <button type="button" disabled
                            class="py-3 text-sm font-semibold rounded-lg bg-surface-container-highest text-on-surface-variant/40 border border-transparent opacity-60 cursor-not-allowed flex flex-col items-center justify-center min-h-[4rem]">
                            <span class="line-through">${formatTime(s.startTime)} - ${formatTime(s.endTime)}</span>
                            <span class="text-[10px] uppercase font-bold mt-1">${s.available === false ? "Đã đặt" : "Đã qua"}</span>
                        </button>
                    `;
                }

                return `
                    <button type="button"
                        onclick='selectSlot(${JSON.stringify({
                            startTime: s.startTime,
                            endTime: s.endTime,
                            price: price
                        })}, this)'
                        class="slot-btn py-3 text-sm font-semibold rounded-lg bg-surface-container-high text-on-surface-variant border-2 border-transparent hover:border-primary-container/30 transition-all flex flex-col items-center justify-center min-h-[4rem]">
                        <span>${formatTime(s.startTime)} - ${formatTime(s.endTime)}</span>
                    </button>
                `;
            }).join('');
        }

        function selectSlot(slot, btnElement) {
            document.querySelectorAll('.slot-btn').forEach(b => {
                b.classList.remove('bg-primary-container', 'text-white', 'border-primary', 'shadow-lg', 'scale-105');
                b.classList.add('bg-surface-container-high', 'text-on-surface-variant', 'border-transparent');
            });

            btnElement.classList.remove('bg-surface-container-high', 'text-on-surface-variant', 'border-transparent');
            btnElement.classList.add('bg-primary-container', 'text-white', 'border-primary', 'shadow-lg', 'scale-105');

            selectedSlot = slot;
            updateSummary();
        }

        function updateSummary() {
            const summary = document.getElementById('bookingSummary');
            if(!selectedSlot || !selectedCourtInfo) {
                summary.innerHTML = `
                    <div class="absolute top-0 left-0 w-1 h-full bg-primary-container"></div>
                    <h4 class="text-sm font-bold uppercase tracking-[0.2em] text-on-surface-variant mb-8">Tóm tắt đơn hàng</h4>
                    <div class="space-y-5 mb-8 text-on-surface-variant">
                        Vui lòng chọn giờ để xem giá
                    </div>
                    <button disabled class="opacity-50 w-full bg-gradient-to-br from-primary to-primary-container text-white py-5 rounded-lg font-bold text-lg transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
                        Xác nhận đặt sân
                    </button>
                `;
                return;
            }

            const basePrice = selectedSlot.price;

            summary.innerHTML = `
                <div class="absolute top-0 left-0 w-1 h-full bg-primary-container"></div>
                <h4 class="text-sm font-bold uppercase tracking-[0.2em] text-on-surface-variant mb-8">Tóm tắt đơn hàng</h4>
                <div class="space-y-5 mb-8">
                    <div class="flex justify-between items-center">
                        <span class="text-on-surface-variant">Giờ này (${selectedCourtInfo.name})</span>
                        <span class="font-medium">${new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(basePrice)}</span>
                    </div>
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-on-surface-variant">Giờ đặt</span>
                        <span class="font-medium">${formatTime(selectedSlot.startTime)} - ${formatTime(selectedSlot.endTime)}</span>
                    </div>
                    <div class="pt-5 border-t border-slate-100 flex justify-between items-end">
                        <div>
                            <p class="text-xs font-bold text-on-surface-variant uppercase tracking-wider">Tổng thanh toán</p>
                            <p class="text-4xl font-black text-on-surface tracking-tighter mt-1 font-headline">${new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(basePrice)}</p>
                        </div>
                    </div>
                </div>
                <button type="button" onclick="submitBooking()" id="submitBtn" class="w-full bg-gradient-to-br from-primary to-primary-container text-white py-5 rounded-lg font-bold text-lg shadow-xl shadow-orange-500/20 active:scale-[0.98] hover:brightness-110 transition-all flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
                    Xác nhận đặt sân
                </button>
            `;
        }

        function formatTime(timeStr) {
            if (!timeStr) return "--:--";
            // If it's a timestamp
            if (timeStr.includes('T')) {
                const date = new Date(timeStr);
                return date.toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'});
            }
            // If it's just a time string
            const parts = timeStr.split(':');
            if (parts.length >= 2) {
                return `${parts[0].padStart(2, '0')}:${parts[1].padStart(2, '0')}`;
            }
            return timeStr;
        }

        function buildLocalDateTimeStr(dateStr, timeStr) {
            if (!timeStr) return null;
            if (timeStr.includes('T')) return timeStr;
            if (!dateStr) {
                const today = new Date();
                dateStr = today.toISOString().split('T')[0];
            }
            const parts = timeStr.split(':');
            let h = parts[0].padStart(2, '0');
            let m = parts.length > 1 ? parts[1].padStart(2, '0') : '00';
            let s = parts.length > 2 ? parts[2].padStart(2, '0') : '00';
            return `${dateStr}T${h}:${m}:${s}`;
        }

        async function submitBooking() {
            if(!selectedSlot || !selectedCourtInfo) return;

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = 'Đang xử lý...';

            try {
                const user = OwnerAuth.getUser();
                if(!user) throw new Error("Chưa đăng nhập");

                let bookingStaffId = null;

                if (user.roles && user.roles.includes('STAFF')) {
                    bookingStaffId = user.id;
                } else {
                    // If owner, fetch first staff of chosen court's venue or any staff
                    const ownerId = OwnerAuth.getOwnerId();
                    const staffRes = await OwnerAuth.authFetch(`/api/staff/owner/${ownerId}`);
                    if (staffRes.ok) {
                        const staffJson = await staffRes.json();
                        const staffs = staffJson.data || [];
                        if (staffs.length > 0) {
                            // Find first staff that can create block
                            const capableStaff = staffs.find(s => s.permissions && s.permissions.includes('CAN_CREATE_BOOKING'));
                            bookingStaffId = capableStaff ? capableStaff.id : staffs[0].id;
                        }
                    }
                    if (!bookingStaffId) {
                        throw new Error("Không tìm thấy nhân viên nào để thực hiện thao tác này. Vui lòng tạo ít nhất 1 nhân viên.");
                    }
                }

                const dateStr = document.getElementById('bookingDate').value;
                const startLDT = buildLocalDateTimeStr(dateStr, selectedSlot.startTime);
                const endLDT = buildLocalDateTimeStr(dateStr, selectedSlot.endTime);

                const payload = {
                    courtId: selectedCourtInfo.id,
                    startTime: startLDT,
                    endTime: endLDT,
                    customerName: document.getElementById('customerName').value,
                    customerPhone: document.getElementById('customerPhone').value,
                    paymentMethod: document.getElementById('selectedPaymentMethod').value,
                    notes: document.getElementById('bookingNotes').value
                };

                const res = await OwnerAuth.authFetch(`/api/staff/walk-in-booking?staffId=${bookingStaffId}`, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                const json = await res.json();
                if(res.ok && json.success) {
                    document.getElementById('bookingSummary').classList.add('hidden');
                    document.getElementById('successPanel').classList.remove('hidden');
                } else {
                    throw new Error(json.message || "Lỗi tạo booking");
                }

            } catch(e) {
                alert(e.message);
                btn.disabled = false;
                btn.innerHTML = `
                    <span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
                    Xác nhận đặt sân
                `;
            }
        }
    </script>
</body></html>
