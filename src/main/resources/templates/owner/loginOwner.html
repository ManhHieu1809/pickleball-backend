<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Pickleball Owner Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

    <style type="text/tailwindcss">
        :root {
            --primary: #00f583;
            --bg-soft-grey: #f9fafb;
            --text-main: #0c1d15;
            --text-secondary: #6b7280;
        }
        .dot-pattern {
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 20px 20px;
        }
        [data-tooltip] {
            position: relative;
        }

        [data-tooltip]::after {
            content: attr(data-tooltip);
            position: absolute;
            left: calc(100% + 10px);
            top: 50%;
            transform: translateY(-50%);
            background: #1e293b;
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            padding: 4px 10px;
            border-radius: 6px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s ease;
            z-index: 9999;
        }

        [data-tooltip]:hover::after {
            opacity: 1;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-highest": "#e0e3e5",
                        "on-secondary-fixed": "#111c2d",
                        "tertiary-fixed": "#cde5ff",
                        "on-tertiary-fixed": "#001d32",
                        "on-surface": "#191c1e",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#eceef0",
                        "tertiary-fixed-dim": "#93ccff",
                        "on-primary": "#ffffff",
                        "surface": "#f7f9fb",
                        "secondary-fixed": "#d8e3fb",
                        "secondary-container": "#d5e0f8",
                        "on-secondary-fixed-variant": "#3c475a",
                        "outline": "#8c7164",
                        "primary-fixed-dim": "#ffb690",
                        "surface-container-high": "#e6e8ea",
                        "secondary-fixed-dim": "#bcc7de",
                        "on-surface-variant": "#584237",
                        "surface-tint": "#9d4300",
                        "surface-bright": "#f7f9fb",
                        "on-secondary-container": "#586377",
                        "tertiary": "#006398",
                        "surface-dim": "#d8dadc",
                        "surface-variant": "#e0e3e5",
                        "on-error": "#ffffff",
                        "inverse-on-surface": "#eff1f3",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#783200",
                        "on-primary-container": "#582200",
                        "error": "#ba1a1a",
                        "tertiary-container": "#00a2f4",
                        "on-tertiary": "#ffffff",
                        "outline-variant": "#e0c0b1",
                        "background": "#f7f9fb",
                        "primary-fixed": "#ffdbca",
                        "primary-container": "#f97316",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#004b74",
                        "primary": "#9d4300",
                        "on-tertiary-container": "#003554",
                        "error-container": "#ffdad6",
                        "surface-container-low": "#f2f4f6",
                        "on-primary-fixed": "#341100",
                        "inverse-surface": "#2d3133",
                        "secondary": "#545f73",
                        "on-background": "#191c1e",
                        "inverse-primary": "#ffb690",

                        "primary-dark": "#783200",
                        "secondary-dark": "#3c475a",
                        "background-light": "#f7f9fb",
                        "background-dark": "#0f172a",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1f2937",
                        "card-dark": "#1f2937"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "sans": ["Inter", "sans-serif"],
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1.5rem", "3xl": "2rem", "full": "9999px"},
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'card': '0 0 0 1px rgba(0,0,0,0.03), 0 2px 8px rgba(0,0,0,0.04)'
                    }
                }
            }
        }
    </script>
</head>

<body class="font-display bg-[#f3f4f6] text-[#0c1d15] antialiased min-h-screen w-full flex flex-col">
    <header
        class="w-full bg-white border-b border-gray-100 px-4 py-2 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="bg-primary p-1 rounded-lg">
                <span class="material-symbols-outlined text-black text-xl font-bold">sports_tennis</span>
            </div>
            <span class="text-lg font-black tracking-tight">Pickleball Marketplace</span>
        </div>
        <nav class="hidden md:flex items-center gap-8 text-sm font-semibold text-gray-600">
            <a class="hover:text-primary transition-colors" href="#">Trang chủ</a>
            <a class="hover:text-primary transition-colors" href="#">Về chúng tôi</a>
            <a class="hover:text-primary transition-colors" href="#">Trợ giúp</a>
            <button class="bg-gray-100 hover:bg-gray-200 text-black px-5 py-2 rounded-lg transition-colors">Đăng nhập
                Chủ sân</button>
        </nav>
    </header>
    <main class="flex-1 flex items-center justify-center p-2">
        <div
            class="bg-white w-full max-w-4xl min-h-[450px] rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row relative">
            <div class="md:w-1/2 relative bg-white p-6 flex flex-col justify-center overflow-hidden">
                <div class="absolute inset-0 dot-pattern opacity-40"></div>
                <lottie-player src="/animations/pickleball.json" background="transparent" speed="1"
                    style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1;"
                    loop autoplay>
                </lottie-player>
            </div>
            <div class="md:w-1/2 p-6 md:p-8 flex flex-col justify-center bg-white">
                <div class="max-w-xs mx-auto w-full">
                    <div class="flex items-center gap-1.5 mb-1">
                        <span class="material-symbols-outlined text-primary text-lg fill-1">check_circle</span>
                        <span class="text-gray-400 font-bold text-[10px] tracking-[0.2em] uppercase">Admin Portal</span>
                    </div>
                    <h2 class="text-xl font-black mb-1">Đăng nhập</h2>
                    <p class="text-gray-400 mb-4 font-medium text-xs">Nhập thông tin xác thực để tiếp tục.</p>
                    <!-- Error message -->
                    <div id="login-error" class="hidden mb-3 p-2.5 bg-red-50 border border-red-200 rounded-lg">
                        <p class="text-red-600 text-[11px] font-bold flex items-center gap-1.5">
                            <span class="material-symbols-outlined text-sm">error</span>
                            <span id="login-error-text"></span>
                        </p>
                    </div>
                    <form id="login-form" class="space-y-3">
                        <div class="space-y-1">
                            <label class="text-[11px] font-bold text-gray-700">Email hoặc Username</label>
                            <div class="relative group">
                                <div
                                    class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-primary transition-colors">
                                    <span class="material-symbols-outlined text-base">person</span>
                                </div>
                                <input id="login-email"
                                    class="w-full h-10 bg-gray-50 border-none rounded-lg pl-10 pr-3 focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-gray-400 font-bold text-xs"
                                    placeholder="Nhập email hoặc username" type="text" required />
                            </div>
                        </div>
                        <div class="space-y-1">
                            <div class="flex justify-between items-center">
                                <label class="text-[11px] font-bold text-gray-700">Mật khẩu</label>
                            </div>
                            <div class="relative group">
                                <div
                                    class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-primary transition-colors">
                                    <span class="material-symbols-outlined text-base">lock</span>
                                </div>
                                <input id="login-password"
                                    class="w-full h-10 bg-gray-50 border-none rounded-lg pl-10 pr-10 focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-gray-400 font-bold text-xs"
                                    placeholder="Nhập mật khẩu" type="password" required />
                                <button
                                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
                                    type="button" onclick="togglePassword()">
                                    <span id="toggle-pw-icon" class="material-symbols-outlined text-base">visibility</span>
                                </button>
                            </div>
                            <div class="text-right">
                                <a class="text-[10px] font-bold text-gray-500 hover:text-black transition-colors"
                                    href="#">Quên mật khẩu?</a>
                            </div>
                        </div>
                        <button id="login-btn"
                            class="w-full h-10 bg-primary hover:brightness-105 active:scale-[0.98] text-black font-black rounded-lg transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2 text-xs"
                            type="submit">
                            <span id="login-btn-text">Đăng nhập</span>
                            <span id="login-btn-icon" class="material-symbols-outlined text-base">login</span>
                            <span id="login-spinner" class="hidden animate-spin material-symbols-outlined text-base">progress_activity</span>
                        </button>
                    </form>
                    <div class="relative my-4">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-gray-100"></div>
                        </div>
                        <div class="relative flex justify-center text-[10px] uppercase">
                            <span class="bg-white px-2 text-gray-400 font-bold tracking-widest">Hoặc</span>
                        </div>
                    </div>
                    <div class="space-y-2 text-center">
                        <p class="text-gray-400 text-[10px] font-medium">Bạn không phải là Admin?</p>
                        <button
                            class="w-full h-10 border border-gray-100 hover:bg-gray-50 transition-colors rounded-lg flex items-center justify-center gap-2 font-bold text-gray-800 text-xs">
                            <span class="material-symbols-outlined text-base">storefront</span>
                            Đăng nhập Chủ sân
                        </button>
                    </div>
                    <div
                        class="mt-4 flex items-center justify-center gap-3 text-[9px] font-bold text-gray-400 uppercase tracking-wider">
                        <a class="hover:text-black transition-colors" href="#">Điều khoản</a>
                        <span class="w-0.5 h-0.5 bg-gray-300 rounded-full"></span>
                        <a class="hover:text-black transition-colors" href="#">Bảo mật</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/owner-auth.js"></script>
    <script>
        // If already logged in as admin/owner/staff, redirect to dashboard
        (async () => {
            const token = OwnerAuth.getToken();
            if (token) {
                const user = OwnerAuth.getUser();
                if (user && user.roles && (user.roles.includes('OWNER') || user.roles.includes('STAFF'))) {
                    window.location.href = '/owner/dashboard';
                    return;
                }
            }
        })();

        function togglePassword() {
            const input = document.getElementById('login-password');
            const icon = document.getElementById('toggle-pw-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        function showError(msg) {
            const el = document.getElementById('login-error');
            document.getElementById('login-error-text').textContent = msg;
            el.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('login-error').classList.add('hidden');
        }

        function setLoading(loading) {
            const btn = document.getElementById('login-btn');
            const text = document.getElementById('login-btn-text');
            const icon = document.getElementById('login-btn-icon');
            const spinner = document.getElementById('login-spinner');
            btn.disabled = loading;
            if (loading) {
                text.textContent = 'Đang xử lý...';
                icon.classList.add('hidden');
                spinner.classList.remove('hidden');
                btn.classList.add('opacity-70', 'cursor-not-allowed');
            } else {
                text.textContent = 'Đăng nhập';
                icon.classList.remove('hidden');
                spinner.classList.add('hidden');
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            if (!email || !password) {
                showError('Vui lòng nhập đầy đủ tài khoản và mật khẩu');
                return;
            }

            setLoading(true);
            try {
                await OwnerAuth.login(email, password);
                window.location.href = '/owner/dashboard';
            } catch (err) {
                showError(err.message);
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>

</html>
