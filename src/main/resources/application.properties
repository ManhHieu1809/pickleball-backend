spring.application.name=Pickleball
# ---------- Server ----------
server.port=8080

# ---------- Datasource / MySQL ----------
spring.datasource.url=jdbc:mysql://localhost:3306/pickleball?useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false&characterEncoding=utf8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hikari connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=600000

# ---------- JPA / Hibernate ----------
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# Only use 'update' for dev; production should use flyway/liquibase
spring.jpa.hibernate.ddl-auto=none

# ---------- Flyway ----------
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
spring.flyway.locations=classpath:db/migration
# For development: clean and repair on errors
spring.flyway.clean-disabled=false

# ---------- Jackson / Timezone ----------
spring.jackson.time-zone=UTC

# ---------- Logging ----------
logging.level.org.springframework=INFO
logging.level.com.example=DEBUG

# ---------- Optional: Externalize DB creds via env vars ----------
# spring.datasource.username=${DB_USER:root}
# spring.datasource.password=${DB_PASS:password}

# ---------- JWT Configuration ----------
# Luu y: dat secret qua bien moi truong trong production, vi du APP_JWT_SECRET
# Secret must be at least 256 bits (32 bytes) and base64 encoded for HS256
app.security.jwt.secret=${APP_JWT_SECRET:cGlja2xlYmFsbC1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW4tZ2VuZXJhdGlvbi0yMDI0LXNlY3VyZQ==}
app.security.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
